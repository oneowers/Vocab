version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js App Router
  - React
  - Tailwind CSS
  - Framer Motion
  - Supabase Auth
routes:
  - path: /login
    file: app/(auth)/login/page.tsx
    auth_required: false
    description: Email/password login page
  - path: /register
    file: app/(auth)/register/page.tsx
    auth_required: false
    description: New account registration page
  - path: /
    file: app/(app)/page.tsx
    auth_required: true
    description: Main dashboard with streak, daily quest, and word catalog
  - path: /cards
    file: app/(app)/cards/page.tsx
    auth_required: true
    description: User vocabulary cards list with filters and summary
  - path: /practice
    file: app/(app)/practice/page.tsx
    auth_required: true
    description: Writing challenge and AI feedback practice page
  - path: /onboarding
    file: app/(app)/onboarding/page.tsx
    auth_required: true
    description: CEFR level test onboarding flow
  - path: /profile
    file: app/(app)/profile/page.tsx
    auth_required: true
    description: User profile and settings page
features:
  - name: User Login
    description: Sign in with email and password
    files:
      - app/(auth)/login/page.tsx
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button
      - See error on invalid credentials
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: User Registration
    description: Create a new account
    files:
      - app/(auth)/register/page.tsx
    entry_route: /register
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Register button
      - See success redirect to onboarding
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Vocabulary Cards
    description: View, filter, and create personal vocabulary cards
    files:
      - app/(app)/cards/page.tsx
    entry_route: /cards
    user_interactions:
      - View cards list with summary stats
      - Search for a card by keyword
      - Filter by status (known/unknown)
      - Filter by due date (today)
      - Click Add Card button to open form
      - Fill original word, translation, and direction fields
      - Submit the new card form
      - See the new card in the list
    api_calls:
      - method: GET
        endpoint: /api/cards
      - method: POST
        endpoint: /api/cards
    auth_required: true
  - name: AI Writing Challenge
    description: Submit writing and receive AI grammar/usage feedback
    files:
      - app/(app)/practice/page.tsx
    entry_route: /practice
    user_interactions:
      - Navigate to practice page
      - Fill in writing text area
      - Fill in target words field
      - Submit writing challenge
      - View AI feedback with corrections
    api_calls:
      - method: POST
        endpoint: /api/practice
    auth_required: true
  - name: CEFR Onboarding Test
    description: Answer vocabulary questions to determine CEFR level
    files:
      - app/(app)/onboarding/page.tsx
    entry_route: /onboarding
    user_interactions:
      - Answer multiple-choice vocabulary questions
      - Submit level test
      - View CEFR level result
      - Proceed to dashboard
    api_calls:
      - method: POST
        endpoint: /api/cefr-profile
    auth_required: true
  - name: Authentication Guard
    description: Redirect unauthenticated users to login
    files:
      - middleware.ts
    entry_route: /cards
    user_interactions:
      - Navigate to protected route while signed out
      - See redirect to login page
      - Sign in and return to protected page
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Login flow sets email-session cookie in local dev, not sb-access-token
    location: app/api/auth/login/route.ts
    impact: Tests should accept any auth cookie, not just sb-access-token
